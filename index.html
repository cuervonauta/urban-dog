<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urban Dog: Street King v2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none; outline: none; margin: 0; padding: 0; }
        body {
            background: #0a0a0c;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Press Start 2P', cursive; color: white; overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vw; height: 56.25vw;
            max-height: 65vh; max-width: 115vh;
            background: #1a1a2e;
            border: 3px solid #333; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        .hud {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between;
            font-size: 7px; pointer-events: none; z-index: 10; padding: 8px;
        }
        .stat { background: rgba(0,0,0,0.75); padding: 6px 8px; border: 1px solid #444; min-width: 70px; line-height: 1.8; }
        .controls { width: 100%; max-width: 800px; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 48px); gap: 6px; }
        .action-pad { display: flex; gap: 10px; align-items: flex-end; }
        .btn {
            width: 48px; height: 48px; background: #2c3e50; border: 3px solid #1a252f;
            border-bottom-width: 5px; border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 15px; color: #ecf0f1; cursor: pointer; transition: transform 0.1s;
        }
        .btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .btn-yellow { background: #f39c12; border-color: #e67e22; color: #000; }
        .btn-red { background: #c0392b; border-color: #922b21; }
        .btn-blue { background: #2980b9; border-color: #1a6089; }
        .btn-label { font-size: 6px; margin-top: 3px; color: #7f8fa6; text-align: center; }
        .desktop-hint { font-size: 7px; color: #444; margin-top: 4px; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="stat">PTS<br><span id="ui-score">000</span></div>
        <div class="stat" id="ui-char-stat" style="text-align:center">🐕<br><span id="ui-char">ZORRO</span></div>
        <div class="stat" style="text-align:right">VIDAS <span id="ui-lives">3</span><br><span id="ui-health">❤❤❤</span></div>
    </div>
    <canvas id="game"></canvas>
</div>

<div class="controls">
    <div class="d-pad">
        <div></div>
        <div><button class="btn" id="btnUp">↑</button></div>
        <div></div>
        <div><button class="btn" id="btnLeft">←</button></div>
        <div><button class="btn btn-yellow" id="btnDown">💧</button></div>
        <div><button class="btn" id="btnRight">→</button></div>
    </div>
    <div class="action-pad">
        <div><button class="btn btn-red" id="btnBite">Z</button><div class="btn-label">MORDER</div></div>
        <div><button class="btn btn-blue" id="btnJump">A</button><div class="btn-label">SALTAR</div></div>
    </div>
</div>
<div class="desktop-hint">FLECHAS / Z (Morder) / ESPACIO (Saltar)</div>

<script>
// ═══════════════════════════════════════════════════════════
//  URBAN DOG: STREET KING — v2.0 Sprite Edition
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 640, H = 360;
canvas.width = W; canvas.height = H;

// ── GOOGLE DRIVE SPRITES ────────────────────────────────────────
// Mapeo de Google Drive File IDs para Zorro y Dali
const GD_SPRITES = {
    zorro: {
        idle:       'https://drive.google.com/file/d/1CAzfCRCmJRmJhcpp80Ads7KF17nitvHM/view?usp=drive_link',
        walk:       'https://drive.google.com/file/d/1CAzfCRCmJRmJhcpp80Ads7KF17nitvHM/view?usp=drive_link,
        run:        'https://drive.google.com/file/d/1A36MSj-fnyEWL3F2hfDQwQ8Pu8BdYsct/view?usp=drive_link',
        jump:       'https://drive.google.com/file/d/1u1cTOclzWjKaUR3ybCjZhW4R0V9luFI1/view?usp=drive_link',
        dog_bite:   '1https://drive.google.com/file/d/1eI-ltXV_xFr9WYEWf-xjxjJeaonT039e/view?usp=drive_link',
        give_a_paw: 'https://drive.google.com/file/d/1yv0oqpn_FJ3pF12NZ8L-fSAcUtvllMj9/view?usp=drive_link',
        pickup:     'https://drive.google.com/file/d/1N-Z9L991gK2YS8qTNcwRGXLM9ELBJygj/view?usp=drive_link',
    },
    dali: {
        // 👇 Añade aquí los file IDs de Dali cuando proporciones los links
    },
};
function gdUrl(fileId) { return `https://drive.google.com/uc?export=download&id=${fileId}`; }

const CHARS_CONFIG = {
    zorro:    { label: 'ZORRO',    color: '#a0785a', accent: '#f39c12', desc: 'VELOZ / ÁGIL' },
    dali:     { label: 'DALÍ',     color: '#8b6914', accent: '#9b59b6', desc: 'EQUILIBRADO' },
    akita:    { label: 'AKITA',    color: '#e67e22', accent: '#e74c3c' },
    frenchie: { label: 'FRENCHIE', color: '#7f8c8d', accent: '#95a5a6' },
    golden:   { label: 'GOLDEN',   color: '#d4ac0d', accent: '#f1c40f' },
    collie:   { label: 'COLLIE',   color: '#4a4a8a', accent: '#8899ff' },
};

// Mapeo de acciones a nombres de animación por personaje
// Zorro: tiene "make pee", "dog bite" dedicados. Dalí: tiene "scratch_cat" para ataque.
const ANIM_MAP = {
    pee:  ['make_pee', 'realy_make_a_pee', 'make pee', 'custom', 'idle'],
    bite: ['dog_bite', 'bite', 'scratch_cat', 'custom', 'idle'],
    hit:  ['punch', 'kick', 'custom', 'walk'],
};
function pickAnim(charKey, actionKey) {
    for (const name of ANIM_MAP[actionKey]) {
        if (sprites[charKey]?.[name]) return name;
    }
    return 'idle';
}
function norm(s) { return s.toLowerCase().replace(/\s+/g, '_'); }

// ── SPRITE SYSTEM ────────────────────────────────────────────
const COLS = 5, FSIZE = 256, FCOUNT = 25;
const sprites = {}; // sprites[charKey][animName] = HTMLImageElement

async function callAutosprite(toolName, args) {
    const body = JSON.stringify({
        jsonrpc: '2.0', id: Date.now(),
        method: 'tools/call',
        params: { name: toolName, arguments: args }
    });
    const resp = await fetch(AS_URL, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${AS_KEY}`, 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' },
        body
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const ct = resp.headers.get('content-type') || '';
    let data;
    if (ct.includes('event-stream')) {
        // SSE response — parse data lines
        const text = await resp.text();
        for (const line of text.split('\n')) {
            if (!line.startsWith('data: ')) continue;
            try { data = JSON.parse(line.slice(6)); if (data.result) break; } catch {}
        }
    } else {
        data = await resp.json();
    }
    const textContent = data?.result?.content?.[0]?.text;
    if (textContent) return JSON.parse(textContent);
    if (data?.result?.items) return data.result;
    return data?.result;
}

function loadImg(url) {
    return new Promise(resolve => {
        if (!url) return resolve(null);
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = url;
    });
}

async function loadCharSprites(charKey) {
    sprites[charKey] = {};
    const fileIds = GD_SPRITES[charKey];
    if (!fileIds || Object.keys(fileIds).length === 0) {
        console.warn(`⚠️  ${charKey}: sin file IDs en GD_SPRITES`);
        return;
    }
    try {
        await Promise.all(Object.entries(fileIds).map(async ([animName, fileId]) => {
            const url = gdUrl(fileId);
            const img = await loadImg(url);
            if (img) {
                sprites[charKey][animName] = img;
                console.log(`  ✓ ${charKey}.${animName}`);
            } else {
                console.warn(`  ✗ ${charKey}.${animName} - no se cargó`);
            }
        }));
        console.log(`✅ ${charKey}: ${Object.keys(sprites[charKey]).length} animaciones cargadas`);
    } catch (e) {
        console.warn(`❌ ${charKey} failed:`, e.message);
    }
}

// ── ANIMATION ENGINE ─────────────────────────────────────────
const animStates = {};

function animTick(uid, animName, fps = 12, loop = true) {
    if (!animStates[uid] || animStates[uid].name !== animName) {
        animStates[uid] = { name: animName, frame: 0, timer: 0 };
    }
    const a = animStates[uid];
    a.timer++;
    if (a.timer >= Math.floor(60 / fps)) {
        a.timer = 0;
        if (loop) a.frame = (a.frame + 1) % FCOUNT;
        else      a.frame = Math.min(a.frame + 1, FCOUNT - 1);
    }
    return a.frame;
}

function drawSprite(charKey, animName, frame, x, y, w, h, facing) {
    const sheet = sprites[charKey]?.[animName] ?? sprites[charKey]?.['idle'] ?? sprites[charKey]?.['walk'];
    if (!sheet) return false;
    const col = frame % COLS, row = Math.floor(frame / COLS);
    ctx.save();
    if (facing === -1) {
        ctx.translate(x + w, y); ctx.scale(-1, 1);
        ctx.drawImage(sheet, col * FSIZE, row * FSIZE, FSIZE, FSIZE, 0, 0, w, h);
    } else {
        ctx.drawImage(sheet, col * FSIZE, row * FSIZE, FSIZE, FSIZE, x, y, w, h);
    }
    ctx.restore();
    return true;
}

// Fallback geometric rendering
function drawDogGeo(x, y, w, h, facing, color, type) {
    ctx.save();
    ctx.translate(x + (facing === -1 ? w : 0), y);
    ctx.scale(facing, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(4, h - 2, w - 8, 3);
    ctx.fillStyle = color;
    ctx.fillRect(4, h * 0.45, w - 12, h * 0.52);
    ctx.fillRect(w - 14, h * 0.1, 18, 20);
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(w, h * 0.5, 7, 7);
    if (type !== 'simple') {
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.moveTo(w - 12, h * 0.1); ctx.lineTo(w - 6, -6); ctx.lineTo(0, h * 0.1); ctx.fill();
        ctx.beginPath(); ctx.moveTo(w + 2, h * 0.1); ctx.lineTo(w + 8, -6); ctx.lineTo(w + 14, h * 0.1); ctx.fill();
    }
    ctx.fillStyle = '#000'; ctx.fillRect(w - 2, h * 0.25, 3, 3);
    ctx.restore();
}

function drawChar(uid, charKey, animName, fps, loop, x, y, w, h, facing) {
    const frame = animTick(uid, animName, fps, loop);
    if (!drawSprite(charKey, animName, frame, x, y, w, h, facing)) {
        drawDogGeo(x, y, w, h, facing, CHARS_CONFIG[charKey]?.color || '#a0785a', 'hero');
    }
}

// ── GAME STATE ───────────────────────────────────────────────
let score = 0, lives = 3, health = 3, cameraX = 0;
let gameState = 'start'; // start | charSelect | loading | playing | won | gameover
let selectedChar = 'zorro';
let spritesLoaded = false;
let loadingMsg = 'Cargando sprites...';
let charSelectFrame = 0;

const GROUND_Y = 288;

const player = { x: 80, y: GROUND_Y - 72, w: 72, h: 72, vx: 0, vy: 0, grounded: true, facing: 1, isBiting: 0, isPeeing: 0, invul: 0 };

const enemies = [
    { id:'e0', x:  620, y: GROUND_Y-52, w:52, h:52, charKey:'frenchie', dir:-1, speed:2.2, alive:true, hitTimer:0 },
    { id:'e1', x: 1100, y: GROUND_Y-52, w:52, h:52, charKey:'collie',   dir: 1, speed:1.5, alive:true, hitTimer:0 },
    { id:'e2', x: 1600, y: GROUND_Y-52, w:52, h:52, charKey:'golden',   dir:-1, speed:1.7, alive:true, hitTimer:0 },
    { id:'e3', x: 2000, y: GROUND_Y-52, w:52, h:52, charKey:'frenchie', dir: 1, speed:2.3, alive:true, hitTimer:0 },
    { id:'e4', x: 2300, y: GROUND_Y-52, w:52, h:52, charKey:'collie',   dir:-1, speed:1.6, alive:true, hitTimer:0 },
];

const boss = { x: 2650, y: GROUND_Y - 128, w: 128, h: 128, hp: 6, maxHp: 6, active: false, vy: 0, timer: 0, facing: -1 };

const items = {
    bags: [{x:460,done:false},{x:960,done:false},{x:1560,done:false},{x:2160,done:false}],
    bones: [{x:710,done:false},{x:1410,done:false},{x:2010,done:false}],
    doghouse: { x: 2920, w: 90, h: 80 }
};

// ── INPUT ─────────────────────────────────────────────────────
const keys = {};
window.onkeydown = e => { keys[e.code] = true; };
window.onkeyup   = e => { keys[e.code] = false; };

function bindBtn(id, code) {
    const el = document.getElementById(id);
    const on = e => { e.preventDefault(); keys[code] = true; };
    const off = e => { e.preventDefault(); keys[code] = false; };
    el.addEventListener('touchstart', on, {passive:false}); el.addEventListener('touchend', off);
    el.addEventListener('mousedown', on); el.addEventListener('mouseup', off); el.addEventListener('mouseleave', off);
}
bindBtn('btnLeft', 'ArrowLeft'); bindBtn('btnRight', 'ArrowRight');
bindBtn('btnDown', 'ArrowDown'); bindBtn('btnJump', 'Space'); bindBtn('btnBite', 'KeyZ');

// ── CHARACTER SELECT ──────────────────────────────────────────
const charOptions = ['zorro', 'dali'];
let charCursor = 0;

canvas.addEventListener('click', e => {
    if (gameState === 'start') {
        gameState = 'charSelect'; return;
    }
    if (gameState === 'charSelect') {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (W / rect.width);
        if (mx < W / 2) { charCursor = 0; selectedChar = 'zorro'; }
        else            { charCursor = 1; selectedChar = 'dali'; }
        startGame(); return;
    }
    if (gameState === 'won' || gameState === 'gameover') location.reload();
});

canvas.addEventListener('touchend', e => {
    if (gameState === 'start') { gameState = 'charSelect'; return; }
    if (gameState === 'charSelect') {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.changedTouches[0].clientX - rect.left) * (W / rect.width);
        charCursor = mx < W / 2 ? 0 : 1;
        selectedChar = charOptions[charCursor];
        startGame(); return;
    }
    if (gameState === 'won' || gameState === 'gameover') location.reload();
});

async function startGame() {
    gameState = 'loading';
    if (!spritesLoaded) {
        loadingMsg = '🐾 Cargando sprites desde Autosprite...';
        try {
            // Solo cargar Zorro y Dalí (los que tenemos sprites en Google Drive)
            const charKeys = ['zorro', 'dali'];
            await Promise.all(charKeys.map(k => loadCharSprites(k)));
            spritesLoaded = true;
            loadingMsg = '✓ ¡Sprites listos!';
        } catch (e) {
            loadingMsg = 'Usando gráficos de respaldo...';
            spritesLoaded = true;
        }
        await new Promise(r => setTimeout(r, 600));
    }
    // Reset game
    score = 0; lives = 3; health = 3; cameraX = 0;
    player.x = 80; player.y = GROUND_Y - 72; player.vx = 0; player.vy = 0; player.grounded = true;
    enemies.forEach((e, i) => { e.alive = true; e.x = [620,1320,1920][i]; });
    boss.hp = 6; boss.active = false; boss.x = 2650; boss.y = GROUND_Y - 128;
    items.bags.forEach(b => b.done = false);
    items.bones.forEach(b => b.done = false);
    document.getElementById('ui-char').textContent = CHARS_CONFIG[selectedChar].label;
    gameState = 'playing';
}

// ── UPDATE ────────────────────────────────────────────────────
function update() {
    if (gameState !== 'playing') return;

    // Player movement
    const spd = keys['ArrowRight'] || keys['ArrowLeft'] ? (keys['Space'] ? 5.5 : 4.8) : 0;
    if (keys['ArrowRight']) { player.vx = spd; player.facing = 1; }
    else if (keys['ArrowLeft']) { player.vx = -spd; player.facing = -1; }
    else player.vx *= 0.8;

    // Jump
    if ((keys['Space'] || keys['ArrowUp']) && player.grounded) {
        player.vy = -13; player.grounded = false;
    }

    // Bite
    if (keys['KeyZ'] && player.isBiting === 0) player.isBiting = 28;

    // Pee on bag
    if (keys['ArrowDown'] && player.grounded && player.isPeeing === 0) {
        items.bags.forEach(b => {
            if (!b.done && Math.abs((player.x + player.w/2) - b.x) < 40) {
                b.done = true; player.isPeeing = 40;
                addScore(5);
            }
        });
    }

    // Physics
    player.vy += 0.7;
    player.x += player.vx;
    player.y += player.vy;

    // Ground collision
    if (player.y >= GROUND_Y - player.h) {
        player.y = GROUND_Y - player.h; player.vy = 0; player.grounded = true;
    }
    if (player.x < 0) player.x = 0;

    cameraX = Math.max(0, Math.min(2700, player.x - 220));

    // Pickup bones
    items.bones.forEach(b => {
        if (!b.done && Math.abs((player.x + player.w/2) - b.x) < 36) {
            b.done = true;
            if (health < 3) health++;
            else addScore(10);
        }
    });

    // Enemies
    enemies.filter(e => e.alive).forEach(en => {
        en.x += en.speed * en.dir;
        if (en.x > 2450 || en.x < 50) en.dir *= -1;

        // Player vs enemy
        if (player.invul <= 0 && rectsOverlap(player, en)) takeDamage();

        // Bite
        if (player.isBiting > 20) {
            const biteX = player.x + (player.facing > 0 ? player.w + 10 : -60);
            if (Math.abs(biteX - en.x) < 65 && Math.abs(player.y - en.y) < 60) {
                en.x += player.facing * 100;
                en.alive = false;
                addScore(15);
            }
        }
        if (en.hitTimer > 0) en.hitTimer--;
    });

    // Boss logic
    if (player.x > 2200) boss.active = true;
    if (boss.active && boss.hp > 0) {
        boss.timer++;
        if (boss.timer % 120 === 0) boss.vy = -14;
        boss.vy += 0.6; boss.y += boss.vy;
        if (boss.y >= GROUND_Y - boss.h) { boss.y = GROUND_Y - boss.h; boss.vy = 0; }
        boss.facing = player.x < boss.x ? -1 : 1;
        boss.x += (player.x < boss.x ? -1 : 1) * 1.6;
        boss.x = Math.max(2400, Math.min(2850, boss.x));

        if (player.invul <= 0 && rectsOverlap(player, {x:boss.x,y:boss.y,w:boss.w,h:boss.h})) takeDamage();

        if (player.isBiting > 20) {
            const biteX = player.x + (player.facing > 0 ? player.w + 10 : -70);
            if (Math.abs(biteX - boss.x) < 100 && Math.abs(player.y - boss.y) < 90) {
                boss.hp--; player.isBiting = 0; boss.x += player.facing * 60;
                if (boss.hp <= 0) { gameState = 'won'; }
            }
        }
    }

    // Dog house — trigger win after boss is dead
    if (boss.hp <= 0 && player.x + player.w > items.doghouse.x && gameState === 'playing') {
        gameState = 'won';
    }

    // Timers
    if (player.invul > 0) player.invul--;
    if (player.isBiting > 0) player.isBiting--;
    if (player.isPeeing > 0) player.isPeeing--;

    updateHUD();
}

function rectsOverlap(a, b) {
    const margin = 12;
    return a.x + margin < b.x + b.w - margin &&
           a.x + a.w - margin > b.x + margin &&
           a.y + margin < b.y + b.h - margin &&
           a.y + a.h - margin > b.y + margin;
}

function addScore(pts) {
    score += pts;
    if (score >= 100) { score -= 100; lives++; }
}

function takeDamage() {
    health--; player.invul = 80;
    if (health <= 0) {
        lives--; health = 3;
        player.x = Math.max(80, cameraX - 60);
        player.y = GROUND_Y - player.h;
        if (lives < 0) gameState = 'gameover';
    }
}

function updateHUD() {
    document.getElementById('ui-score').textContent = String(score).padStart(3, '0');
    document.getElementById('ui-lives').textContent = lives;
    document.getElementById('ui-health').textContent = '❤'.repeat(Math.max(0, health));
}

// ── DRAW ──────────────────────────────────────────────────────
function draw() {
    ctx.clearRect(0, 0, W, H);

    if (gameState === 'start')     { drawStartScreen(); return; }
    if (gameState === 'charSelect'){ drawCharSelect(); return; }
    if (gameState === 'loading')   { drawLoading(); return; }
    if (gameState === 'won')       { drawWorld(); drawWin(); return; }
    if (gameState === 'gameover')  { drawGameOver(); return; }

    drawWorld();
}

function drawWorld() {
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0d1b2a'); sky.addColorStop(1, '#1a2a3a');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

    ctx.save(); ctx.translate(-cameraX, 0);

    const LEVEL_W = 3200;

    // Buildings
    for (let i = 0; i < 14; i++) {
        const bx = i * 240, bh = 80 + (i % 3) * 40;
        ctx.fillStyle = ['#1c2833','#1a252f','#212f3d'][i%3];
        ctx.fillRect(bx, H - bh - 32, 180, bh);
        // Windows
        for (let wy = H - bh - 20; wy < H - 42; wy += 22) {
            for (let wx = bx + 10; wx < bx + 160; wx += 28) {
                ctx.fillStyle = Math.random() > 0.4 ? '#f9ca24' : '#2c3e50';
                ctx.fillRect(wx, wy, 14, 12);
            }
        }
    }

    // Ground / sidewalk
    ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, GROUND_Y, LEVEL_W, H - GROUND_Y);
    ctx.fillStyle = '#34495e'; ctx.fillRect(0, GROUND_Y, LEVEL_W, 8);
    // Sidewalk lines
    ctx.strokeStyle = '#3d5166'; ctx.lineWidth = 2;
    for (let lx = 0; lx < LEVEL_W; lx += 80) {
        ctx.beginPath(); ctx.moveTo(lx, GROUND_Y); ctx.lineTo(lx, H); ctx.stroke();
    }

    // Street lamps
    for (let i = 0; i < 15; i++) {
        const lx = i * 220 + 30;
        ctx.fillStyle = '#566573'; ctx.fillRect(lx, GROUND_Y - 140, 5, 140);
        ctx.fillStyle = '#566573'; ctx.fillRect(lx - 15, GROUND_Y - 140, 22, 5);
        // Glow
        const grd = ctx.createRadialGradient(lx - 8, GROUND_Y - 140, 2, lx - 8, GROUND_Y - 140, 30);
        grd.addColorStop(0, 'rgba(255,230,100,0.5)'); grd.addColorStop(1, 'rgba(255,230,100,0)');
        ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(lx - 8, GROUND_Y - 140, 30, 0, Math.PI * 2); ctx.fill();
    }

    // Trash bags
    items.bags.forEach(b => {
        ctx.fillStyle = b.done ? '#f39c12' : '#1a1a1a';
        ctx.beginPath(); ctx.ellipse(b.x, GROUND_Y - 8, 18, 16, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = b.done ? '#e67e22' : '#333';
        ctx.fillRect(b.x - 5, GROUND_Y - 24, 10, 8);
    });

    // Bones
    items.bones.forEach(b => {
        if (!b.done) {
            ctx.fillStyle = '#ecf0f1';
            ctx.fillRect(b.x - 10, GROUND_Y - 16, 20, 8);
            [b.x - 12, b.x + 8].forEach(bx => {
                ctx.beginPath(); ctx.arc(bx, GROUND_Y - 12, 5, 0, Math.PI * 2); ctx.fill();
            });
        }
    });

    // Dog House
    if (boss.hp <= 0 || player.x > 2700) {
        const dh = items.doghouse;
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(dh.x, GROUND_Y - dh.h, dh.w, dh.h);
        ctx.fillStyle = '#A0522D';
        ctx.beginPath(); ctx.moveTo(dh.x - 8, GROUND_Y - dh.h); ctx.lineTo(dh.x + dh.w/2, GROUND_Y - dh.h - 30); ctx.lineTo(dh.x + dh.w + 8, GROUND_Y - dh.h); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(dh.x + dh.w/2, GROUND_Y - dh.h/2, 20, 0, Math.PI * 2); ctx.fill();
    }

    // ── CHARACTERS ──
    // Enemies
    enemies.filter(e => e.alive).forEach(en => {
        let anim;
        if (en.hitTimer > 0)          anim = pickAnim(en.charKey, 'hit');
        else if (Math.abs(en.speed) > 1.8) anim = 'run';
        else                          anim = 'walk';
        drawChar(en.id, en.charKey, anim, 14, true, en.x, en.y, en.w, en.h, en.dir);
    });

    // Boss
    if (boss.active && boss.hp > 0) {
        const bossAnim = boss.vy < -2 ? 'jump' : 'walk';
        drawChar('boss', 'akita', bossAnim, 10, true, boss.x, boss.y, boss.w, boss.h, boss.facing);
        // Boss HP bar
        const bw = 120, bx = boss.x + boss.w/2 - bw/2;
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(bx - 2, boss.y - 18, bw + 4, 10);
        ctx.fillStyle = '#e74c3c'; ctx.fillRect(bx, boss.y - 16, (boss.hp / boss.maxHp) * bw, 6);
        ctx.fillStyle = '#f39c12'; ctx.font = '6px "Press Start 2P"'; ctx.textAlign = 'center';
        ctx.fillText('AKITA FIRE', boss.x + boss.w/2, boss.y - 22); ctx.textAlign = 'left';
    }

    // Player
    if (player.invul <= 0 || Math.floor(player.invul / 6) % 2 === 0) {
        let pAnim = 'idle';
        if (player.isPeeing > 0)       pAnim = pickAnim(selectedChar, 'pee');
        else if (player.isBiting > 0)  pAnim = pickAnim(selectedChar, 'bite');
        else if (!player.grounded)     pAnim = 'jump';
        else if (Math.abs(player.vx) > 3.5) pAnim = 'run';
        else if (Math.abs(player.vx) > 0.4) pAnim = 'walk';
        const fpsMap = { idle:6, walk:12, run:18, jump:10, custom:10, make_pee:10, realy_make_a_pee:10, dog_bite:14, bite:14, scratch_cat:14 };
        const pFps = fpsMap[pAnim] || 12;
        const pLoop = !['jump'].includes(pAnim);
        drawChar('player', selectedChar, pAnim, pFps, pLoop, player.x, player.y, player.w, player.h, player.facing);
    }

    // FX
    if (player.isPeeing > 0) {
        ctx.fillStyle = `rgba(241,196,15,${player.isPeeing/40})`;
        for (let i = 0; i < 5; i++) ctx.fillRect(player.x + (player.facing>0?player.w-5:-5), player.y + player.h - 5 + Math.random()*10, 3, 3);
    }
    if (player.isBiting > 18) {
        ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(player.x + player.facing * (player.w + 18), player.y + player.h * 0.4, 20, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
    }

    ctx.restore();
}

// ── SCREEN STATES ─────────────────────────────────────────────
function drawStartScreen() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0d1b2a'); g.addColorStop(1, '#1a2a3a');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // Title
    ctx.shadowColor = '#f39c12'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#f39c12'; ctx.font = 'bold 28px "Press Start 2P"';
    ctx.textAlign = 'center'; ctx.fillText('URBAN DOG', W/2, 100);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ecf0f1'; ctx.font = '9px "Press Start 2P"';
    ctx.fillText('STREET KING', W/2, 125);

    // Mini rules
    ctx.fillStyle = '#7f8c8d'; ctx.font = '7px "Press Start 2P"';
    const rules = ['↓ Orina bolsas: +5 pts','Huesos: cura o +10 pts','Z Muerde enemigos','100 pts = vida extra'];
    rules.forEach((r, i) => ctx.fillText(r, W/2, 175 + i * 18));

    // Blink
    if (Math.floor(Date.now() / 600) % 2 === 0) {
        ctx.fillStyle = '#fff'; ctx.font = '8px "Press Start 2P"';
        ctx.fillText('CLICK O TAP PARA JUGAR', W/2, H - 40);
    }
    ctx.textAlign = 'left';
}

function drawCharSelect() {
    charSelectFrame++;
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0d1b2a'); g.addColorStop(1, '#1a2a3a');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#f39c12'; ctx.font = '10px "Press Start 2P"';
    ctx.textAlign = 'center'; ctx.fillText('ELIGE TU PERRO', W/2, 35);

    const cards = [
        { key: 'zorro', x: 60,    label: 'ZORRO',  desc: '★ VELOZ / ÁGIL',    color: '#f39c12' },
        { key: 'dali',  x: W/2+20, label: 'DALÍ',   desc: '◆ EQUILIBRADO',     color: '#9b59b6' },
    ];

    cards.forEach((c, i) => {
        const selected = i === charCursor;
        const cx = c.x, cy = 55, cw = W/2 - 40, ch = H - 100;

        // Card background
        ctx.fillStyle = selected ? 'rgba(243,156,18,0.15)' : 'rgba(255,255,255,0.04)';
        ctx.strokeStyle = selected ? c.color : '#444';
        ctx.lineWidth = selected ? 3 : 1;
        ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 8); ctx.fill(); ctx.stroke();

        // Sprite preview (animated)
        const previewY = cy + 20;
        const previewFrame = animTick(`select_${c.key}`, 'idle', 6, true);
        if (!drawSprite(c.key, 'idle', previewFrame, cx + cw/2 - 50, previewY, 100, 100, 1)) {
            drawDogGeo(cx + cw/2 - 36, previewY + 10, 72, 72, 1, CHARS_CONFIG[c.key].color, 'hero');
        }

        // Labels
        ctx.fillStyle = c.color; ctx.font = '9px "Press Start 2P"';
        ctx.fillText(c.label, cx + cw/2, cy + 140);
        ctx.fillStyle = '#bdc3c7'; ctx.font = '6px "Press Start 2P"';
        ctx.fillText(c.desc, cx + cw/2, cy + 158);

        if (selected) {
            ctx.fillStyle = c.color; ctx.font = '7px "Press Start 2P"';
            ctx.fillText('▼ SELECCIONAR', cx + cw/2, cy + ch - 16);
        }
    });

    ctx.fillStyle = '#7f8c8d'; ctx.font = '7px "Press Start 2P"';
    ctx.fillText('CLICK/TAP IZQUIERDA O DERECHA', W/2, H - 12);
    ctx.textAlign = 'left';
}

function drawLoading() {
    ctx.fillStyle = '#0d1b2a'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f39c12'; ctx.font = '10px "Press Start 2P"';
    ctx.textAlign = 'center'; ctx.fillText(loadingMsg, W/2, H/2 - 10);

    // Loading bar animation
    const bw = 240, bx = W/2 - bw/2;
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.strokeRect(bx, H/2 + 10, bw, 12);
    ctx.fillStyle = '#f39c12';
    const prog = (Math.sin(Date.now() / 300) + 1) / 2;
    ctx.fillRect(bx + 2, H/2 + 12, (bw - 4) * prog, 8);
    ctx.textAlign = 'left';
}

function drawWin() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f39c12'; ctx.font = '18px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#f39c12'; ctx.shadowBlur = 20;
    ctx.fillText('¡VICTORIA!', W/2, H/2 - 30);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ecf0f1'; ctx.font = '8px "Press Start 2P"';
    ctx.fillText(`PUNTOS: ${String(score).padStart(3,'0')}`, W/2, H/2 + 5);
    ctx.fillText('BARRIO CONQUISTADO 🏆', W/2, H/2 + 25);
    if (Math.floor(Date.now()/600)%2===0) { ctx.fillStyle='#fff'; ctx.fillText('CLICK PARA REINICIAR',W/2,H/2+55); }
    ctx.textAlign = 'left';
}

function drawGameOver() {
    ctx.fillStyle = '#0d1b2a'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e74c3c'; ctx.font = '18px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#e74c3c'; ctx.shadowBlur = 20;
    ctx.fillText('GAME OVER', W/2, H/2 - 20);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#7f8c8d'; ctx.font = '8px "Press Start 2P"';
    ctx.fillText(`PUNTOS FINALES: ${score}`, W/2, H/2 + 10);
    if (Math.floor(Date.now()/600)%2===0) { ctx.fillStyle='#fff'; ctx.fillText('CLICK PARA REINTENTAR',W/2,H/2+40); }
    ctx.textAlign = 'left';
}

// ── GAME LOOP ─────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
