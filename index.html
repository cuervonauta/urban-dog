<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urban Dog: Street King (Híbrido)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }

        body {
            margin: 0;
            background: #0a0a0c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Press Start 2P', cursive;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 */
            max-height: 65vh;
            max-width: 115vh;
            background: #1e272e;
            border: 4px solid #333;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }

        /* Pantallas de Estado */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .overlay h1 { color: #f1c40f; font-size: 24px; margin-bottom: 20px; }
        .overlay p { font-size: 10px; line-height: 1.8; color: #bdc3c7; }
        .blink { animation: blinker 1s linear infinite; color: white; margin-top: 20px; font-size: 12px; }
        @keyframes blinker { 50% { opacity: 0; } }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            pointer-events: none;
            z-index: 10;
        }

        .stat {
            background: rgba(0,0,0,0.7);
            padding: 8px;
            border: 1px solid #555;
            min-width: 80px;
        }

        /* Controles */
        .controls {
            width: 100%;
            max-width: 800px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #161a1d;
        }

        /* Ocultar botones en Desktop si se desea, pero mejor dejarlos por accesibilidad táctil */
        @media (min-width: 1024px) {
            .controls-hint-desktop { display: block; font-size: 8px; color: #555; margin-top: 10px; }
        }

        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); gap: 8px; }
        .action-pad { display: flex; gap: 12px; }

        .btn {
            width: 50px;
            height: 50px;
            background: #34495e;
            border: 3px solid #2c3e50;
            border-bottom-width: 6px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #ecf0f1;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(3px);
            border-bottom-width: 3px;
        }

        .btn-yellow { background: #f1c40f; border-color: #d35400; color: #000; }
        .btn-red { background: #e74c3c; border-color: #c0392b; }
        .btn-blue { background: #3498db; border-color: #2980b9; }

        .btn-label { font-size: 7px; margin-top: 4px; color: #7f8fa6; text-align: center; text-transform: uppercase; }

    </style>
</head>
<body>

    <div class="hud">
        <div class="stat">PTS:<br><span id="ui-score">000</span></div>
        <div class="stat">VIDAS:<br><span id="ui-lives">3</span></div>
        <div class="stat">SALUD:<br><span id="ui-health">❤❤❤</span></div>
    </div>

    <!-- Pantalla de Inicio -->
    <div id="start-screen" class="overlay">
        <h1>URBAN DOG</h1>
        <p>MARCA TU TERRITORIO EN LA CIUDAD</p>
        <div style="margin: 20px 0; border: 2px solid #555; padding: 10px; font-size: 8px; text-align: left;">
            Puntos: Orina bolsas (↓) +5<br>
            Huesos: Salud o +10 Puntos<br>
            Vidas: 100 Puntos = Extra Vida
        </div>
        <div class="blink">CLICK O TAP PARA EMPEZAR</div>
    </div>

    <div id="game-container">
        <canvas id="game"></canvas>
    </div>

    <div class="controls">
        <div class="d-pad">
            <div style="grid-column: 2"><button class="btn" id="btnUp">↑</button></div>
            <div><button class="btn" id="btnLeft">←</button></div>
            <div><button class="btn btn-yellow" id="btnDown">💧</button></div>
            <div><button class="btn" id="btnRight">→</button></div>
        </div>
        
        <div class="action-pad">
            <div>
                <button class="btn btn-red" id="btnBite">Z</button>
                <div class="btn-label">MORDER</div>
            </div>
            <div>
                <button class="btn btn-blue" id="btnJump">A</button>
                <div class="btn-label">SALTAR</div>
            </div>
        </div>
    </div>

    <div class="controls-hint-desktop">TECLADO: FLECHAS / Z (Morder) / ESPACIO (Saltar)</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const WIDTH = 640;
        const HEIGHT = 360;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        // --- ESTADO GLOBAL ---
        let score = 0;
        let lives = 3;
        let health = 3;
        let cameraX = 0;
        let gameState = 'start'; // start, playing, won, gameover

        const player = {
            x: 80, y: 280, w: 42, h: 42,
            vx: 0, vy: 0, grounded: false, facing: 1,
            isBiting: 0, isPeeing: 0, invul: 0
        };

        const enemies = [
            { x: 600, type: 'frenchie', color: '#95a5a6', dir: -1, speed: 2.2 },
            { x: 1300, type: 'golden', color: '#f1c40f', dir: -1, speed: 1.8 },
            { x: 1900, type: 'pug', color: '#d35400', dir: 1, speed: 1.2 }
        ];

        const boss = { x: 2650, y: 230, w: 100, h: 100, hp: 6, active: false, vy: 0, timer: 0 };
        const items = { 
            bags: [{x:450}, {x:950}, {x:1550}, {x:2150}], 
            bones: [{x:700}, {x:1400}, {x:2000}] 
        };

        const keys = {};

        // Iniciar Juego
        document.addEventListener('pointerdown', () => {
            if (gameState === 'start') {
                gameState = 'playing';
                document.getElementById('start-screen').style.display = 'none';
            }
        });

        // Controles Híbridos
        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            const startEvent = (e) => { e.preventDefault(); keys[key] = true; };
            const endEvent = (e) => { e.preventDefault(); keys[key] = false; };
            el.addEventListener('touchstart', startEvent);
            el.addEventListener('touchend', endEvent);
            el.addEventListener('mousedown', startEvent);
            el.addEventListener('mouseup', endEvent);
            el.addEventListener('mouseleave', endEvent);
        };
        bindBtn('btnLeft', 'ArrowLeft');
        bindBtn('btnRight', 'ArrowRight');
        bindBtn('btnDown', 'ArrowDown');
        bindBtn('btnJump', 'Space');
        bindBtn('btnBite', 'KeyZ');

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function drawDog(ctx, x, y, size, facing, color, type) {
            ctx.save();
            ctx.translate(x + (facing === -1 ? size : 0), y);
            ctx.scale(facing, 1);
            
            // Sombras
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(5, size-2, size-10, 4);

            // Cuerpo
            ctx.fillStyle = color;
            ctx.fillRect(5, 18, size - 15, size - 20);
            
            // Cabeza (Más detalle)
            ctx.fillStyle = color;
            ctx.fillRect(size - 18, 5, 22, 22);
            
            // Hocico Oscuro (Detalle de la imagen original)
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(size - 2, 18, 8, 8);
            
            // Orejas puntiagudas
            ctx.fillStyle = color;
            if (type === 'hero' || type === 'akita') {
                ctx.beginPath();
                ctx.moveTo(size-15, 5); ctx.lineTo(size-8, -8); ctx.lineTo(size-2, 5); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(size, 5); ctx.lineTo(size+8, -8); ctx.lineTo(size+15, 5); ctx.fill();
            }

            // Ojos
            ctx.fillStyle = 'black';
            ctx.fillRect(size - 4, 12, 4, 4);
            
            ctx.restore();
        }

        function update() {
            if (gameState !== 'playing') return;

            // Físicas Jugador
            if (keys['ArrowRight']) { player.vx = 4.8; player.facing = 1; }
            else if (keys['ArrowLeft']) { player.vx = -4.8; player.facing = -1; }
            else { player.vx *= 0.82; }

            if (keys['Space'] && player.grounded) {
                player.vy = -12.5;
                player.grounded = false;
            }

            // Marcar territorio
            if (keys['ArrowDown'] && player.grounded) {
                items.bags.forEach(b => {
                    if (!b.done && Math.abs(player.x - b.x) < 35) {
                        b.done = true; player.isPeeing = 35; 
                        score += 5;
                        if (score >= 100) { score -= 100; lives++; }
                    }
                });
            }

            // Ataque
            if (keys['KeyZ'] && player.isBiting === 0) player.isBiting = 25;

            player.vy += 0.65;
            player.x += player.vx;
            player.y += player.vy;

            if (player.y > 280) { player.y = 280; player.vy = 0; player.grounded = true; }
            if (player.x < 0) player.x = 0;

            cameraX = Math.max(0, Math.min(2500, player.x - 200));

            // Enemigos
            enemies.forEach(en => {
                en.x += en.speed * en.dir;
                if (en.x > 2400 || en.x < 50) en.dir *= -1;
                
                if (player.invul <= 0 && Math.abs(player.x - en.x) < 30 && Math.abs(player.y - en.y) < 30) takeDamage();
                
                if (player.isBiting > 15 && Math.abs((player.x + 40*player.facing) - en.x) < 55) {
                    en.x += player.facing * 90; // Knockback
                }
            });

            // Objetos
            items.bones.forEach(b => {
                if (!b.done && Math.abs(player.x - b.x) < 35) {
                    b.done = true;
                    if (health < 3) health++; 
                    else { score += 10; if(score >= 100){ score-=100; lives++; } }
                }
            });

            // Lógica de Boss
            if (player.x > 2200) boss.active = true;
            if (boss.active && boss.hp > 0) {
                boss.timer++;
                if (boss.timer % 110 === 0) boss.vy = -13;
                boss.vy += 0.55; boss.y += boss.vy;
                if (boss.y > 230) boss.y = 230;
                boss.x += (player.x < boss.x ? -1 : 1) * 1.8;

                if (player.invul <= 0 && Math.abs(player.x - boss.x) < 65 && Math.abs(player.y - boss.y) < 65) takeDamage();
                
                if (player.isBiting > 15 && Math.abs((player.x + 40*player.facing) - boss.x) < 90) {
                    boss.hp--; player.isBiting = 0; boss.x += player.facing * 50;
                    if (boss.hp <= 0) { gameState = 'won'; alert("¡DERROTASTE AL JEFE!"); location.reload(); }
                }
            }

            if (player.invul > 0) player.invul--;
            if (player.isBiting > 0) player.isBiting--;
            if (player.isPeeing > 0) player.isPeeing--;

            updateHUD();
        }

        function takeDamage() {
            health--; player.invul = 70;
            if (health <= 0) {
                lives--; health = 3; player.x = Math.max(0, cameraX - 100);
                if (lives < 0) { gameState = 'gameover'; alert("SIN VIDAS. Reintentar."); location.reload(); }
            }
        }

        function updateHUD() {
            document.getElementById('ui-score').innerText = score.toString().padStart(3, '0');
            document.getElementById('ui-lives').innerText = lives;
            document.getElementById('ui-health').innerText = "❤".repeat(Math.max(0, health));
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            // Fondo Cielo
            ctx.fillStyle = '#1e272e';
            ctx.fillRect(0,0,WIDTH,HEIGHT);

            ctx.save(); ctx.translate(-cameraX, 0);

            // Escenario (Calle SNES)
            ctx.fillStyle = '#2d3436';
            for(let i=0; i<12; i++) {
                ctx.fillRect(i*300, 80, 140, 270); // Edificios
                ctx.fillStyle = '#f9ca24'; // Luz
                ctx.fillRect(i*300+20, 120, 15, 15);
                ctx.fillStyle = '#2d3436';
            }

            ctx.fillStyle = '#333'; ctx.fillRect(0, 320, 3500, 40); // Acera
            ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.strokeRect(0, 320, 3500, 40);

            // Farolas
            for(let i=0; i<12; i++) {
                ctx.fillStyle = '#000'; ctx.fillRect(i*250+10, 180, 6, 140);
                ctx.fillStyle = '#ffeaa7'; ctx.beginPath(); ctx.arc(i*250+13, 185, 10, 0, 7); ctx.fill();
            }

            // Objetos
            items.bags.forEach(b => {
                ctx.fillStyle = b.done ? '#f1c40f' : '#000';
                ctx.beginPath(); ctx.arc(b.x, 325, 15, 0, 7); ctx.fill();
            });
            items.bones.forEach(b => {
                if(!b.done) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(b.x, 325, 18, 10);
                }
            });

            // Personajes
            enemies.forEach(en => drawDog(ctx, en.x, 280, 40, en.dir, en.color, en.type));
            
            if (boss.hp > 0 && boss.active) {
                drawDog(ctx, boss.x, boss.y, 100, -1, '#e67e22', 'akita');
                // Barra HP Boss mini
                ctx.fillStyle = '#000'; ctx.fillRect(boss.x, boss.y - 20, 100, 6);
                ctx.fillStyle = '#f00'; ctx.fillRect(boss.x, boss.y - 20, (boss.hp/6)*100, 6);
            }

            if (player.invul % 6 === 0) {
                drawDog(ctx, player.x, player.y, 42, player.facing, '#a67c52', 'hero');
            }

            // FX Partículas
            if (player.isPeeing > 0) {
                ctx.fillStyle = '#f1c40f';
                for(let i=0; i<4; i++) ctx.fillRect(player.x - 2, player.y + 35 + Math.random()*8, 4, 4);
            }
            if (player.isBiting > 12) {
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(player.x + (player.facing*55), player.y+20, 18, 0, 7); ctx.stroke();
            }

            ctx.restore();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
