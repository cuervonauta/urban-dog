<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Urban Dog: Street King</title>
    
    <!-- Etiquetas PWA para pantalla completa en móviles -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0c">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap');

        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --ui-gold: #f1c40f;
            --ui-red: #e74c3c;
            --ui-blue: #3498db;
        }

        * { 
            box-sizing: border-box; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
            outline: none; 
        }
        
        body { 
            margin: 0; 
            background: #0a0a0c; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Quicksand', sans-serif; 
            color: white; 
            overflow: hidden; 
            touch-action: none;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #111;
        }

        #game-container { 
            position: relative; 
            flex-grow: 1;
            background: #1e272e; 
            overflow: hidden; 
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
            image-rendering: auto;
        }
        
        /* Pantallas de selección y Game Over */
        .overlay { 
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            text-align: center; 
            padding: 20px;
        }

        .char-select { 
            display: flex; 
            gap: 15px; 
            margin-top: 20px; 
            flex-wrap: wrap; 
            justify-content: center; 
        }

        .char-card { 
            background: #2c3e50; 
            padding: 15px; 
            border-radius: 20px; 
            border: 4px solid #444; 
            cursor: pointer; 
            transition: transform 0.2s, border-color 0.2s; 
            width: 160px; 
        }

        .char-card:active { transform: scale(0.95); }
        .char-card:hover { border-color: var(--ui-gold); }
        .char-card img { width: 100px; height: 100px; border-radius: 15px; margin-bottom: 10px; pointer-events: none; object-fit: contain; background: #161a1d; }
        
        /* HUD Superior */
        .hud { 
            position: absolute; 
            top: calc(15px + var(--safe-top)); 
            left: 15px; 
            right: 15px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 14px; 
            pointer-events: none; 
            z-index: 50; 
        }

        .stat-box { 
            background: rgba(0,0,0,0.7); 
            padding: 10px 15px; 
            border-radius: 12px; 
            border: 2px solid rgba(255,255,255,0.1); 
            text-align: center;
        }

        #boss-ui { 
            position: absolute; 
            top: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 70%; 
            display: none; 
            text-align: center; 
        }

        .hp-bar { height: 12px; background: #333; border: 2px solid #fff; border-radius: 6px; margin-top: 5px; overflow: hidden; }
        #hp-fill { height: 100%; background: var(--ui-red); width: 100%; transition: width 0.3s; }
        
        /* Controles móviles */
        .controls-panel { 
            width: 100%; 
            padding: calc(10px + var(--safe-bottom)) 20px 20px 20px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: #161a1d;
            border-top: 4px solid #222;
        }

        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .action-btns { display: flex; gap: 15px; }

        .btn-ui { 
            width: 70px; 
            height: 70px; 
            background: #34495e; 
            border: none; 
            border-radius: 20px; 
            color: white; 
            font-size: 24px; 
            box-shadow: 0 6px 0 #1b2631; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .btn-ui:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px 0 #1b2631;
            background: #4a627a;
        }

        .btn-action { width: 85px; height: 85px; border-radius: 50%; font-weight: bold; font-size: 16px; }
        .btn-pee { background: var(--ui-gold); color: #000; box-shadow: 0 6px 0 #a68b0a; }
        .btn-bite { background: var(--ui-red); box-shadow: 0 6px 0 #922b21; }
        .btn-jump { background: var(--ui-blue); box-shadow: 0 6px 0 #21618c; }

        .record-info { font-size: 14px; color: var(--ui-gold); margin-top: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <!-- Pantalla Inicial -->
        <div id="start-screen" class="overlay">
            <h1 style="color: var(--ui-gold); font-size: 36px; margin-bottom: 5px;">URBAN DOG</h1>
            <p style="color: #aaa; margin-bottom: 10px;">SELECCIONA TU HÉROE</p>
            
            <div class="record-info">
                🏆 RÉCORD: <span id="high-score">0</span> | BARRIO MÁX: <span id="max-level">1</span>
            </div>

            <div class="char-select">
                <div class="char-card" onclick="selectChar('zorro')">
                    <img src="https://www.autosprite.io/api/files/spritesheets/xw2v7gosl3oc7fvzwd26f5/sheet" alt="Zorro" crossorigin="anonymous">
                    <div>ZORRO</div>
                    <small style="color: var(--ui-gold);">VELOCIDAD +++</small>
                </div>
                <div class="char-card" onclick="selectChar('dali')">
                    <img src="https://www.autosprite.io/api/files/spritesheets/8azjvq5sdxmct8jt5tgxjs/sheet" alt="Dalí" crossorigin="anonymous">
                    <div>DALÍ</div>
                    <small style="color: var(--ui-blue);">SALTO +++</small>
                </div>
            </div>
            <p style="font-size: 10px; color: #777; margin-top: 15px;">Cargando sprites de AutoSprite.io...</p>
        </div>

        <!-- Game Over -->
        <div id="game-over-screen" class="overlay" style="display:none;">
            <h1 style="color: var(--ui-red); font-size: 42px;">¡HAS CAÍDO!</h1>
            <button class="btn-ui" style="width: 220px; height: 60px;" onclick="location.reload()">REINTENTAR</button>
        </div>

        <div id="game-container">
            <div class="hud">
                <div class="stat-box">BARRIO: <span id="ui-level">1</span><br>PTS: <span id="ui-score">000</span></div>
                <div class="stat-box">SALUD<br><span id="ui-health">❤❤❤</span></div>
            </div>

            <div id="boss-ui">
                <div id="boss-name" style="font-size: 14px; font-weight: bold; text-shadow: 2px 2px #000;">BOSS: AKITA FIRE</div>
                <div class="hp-bar"><div id="hp-fill"></div></div>
            </div>

            <canvas id="game"></canvas>
        </div>

        <!-- Controles Móviles -->
        <div class="controls-panel">
            <div class="d-pad">
                <button class="btn-ui" id="ctrlLeft">←</button>
                <button class="btn-ui btn-pee" id="ctrlDown">💧</button>
                <button class="btn-ui" id="ctrlRight">→</button>
            </div>
            
            <div class="action-btns">
                <button class="btn-ui btn-action btn-bite" id="ctrlBite">MORDIDA</button>
                <button class="btn-ui btn-action btn-jump" id="ctrlJump">SALTO</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const GAME_W = 1280;
        const GAME_H = 720;
        canvas.width = GAME_W;
        canvas.height = GAME_H;

        // Mapeo de URLs de AutoSprite basadas en tus links
        const getSpriteUrl = (id) => `https://www.autosprite.io/api/files/spritesheets/${id}/sheet`;

        const ASSETS_MAP = {
            zorro: {
                idle: "xw2v7gosl3oc7fvzwd26f5",
                walk: "25r95becj5c54hg45u8e77",
                run: "x85mesz6g98j3kfhz77b5g",
                jump: "45hp0ao8uwwz3vb41ishws",
                bite: "ezadatbsu96opir8hxii49",
                pee: "fz2rqwqd24o0v5m3yyyhjp"
            },
            dali: {
                idle: "8azjvq5sdxmct8jt5tgxjs",
                walk: "7n79xruevd2l04qgarnnr8",
                run: "pka90vb1xokmu0f9d50q",
                jump: "qqlz09nn9dtoa9wl6tw7",
                bite: "gfdmnl2jwucezifs3pde7w",
                pee: "1e54igurm4xisk9fyzgy3ac"
            },
            enemies: {
                rat: "l1gzfo2joaxj4eytyojz",
                frenchie: "ztxqnbyigj8r6cj8rauca",
                golden: "qz55mpwqofik8pw2in1s8",
                pigeon: "uvrhigstjkr8zafzeegh8u",
                gavilan: "ojl3rd5iexi6xhwamwxe98",
                collie: "py947f7onwzbzxt83qpi",
                boss: "d9l0cbkjr7nc1iwbub62q4"
            }
        };

        // Estado del juego
        let state = { 
            level: 1, score: 0, health: 3, playing: false, 
            cameraX: 0, worldW: 8000, parallaxX: 0, transitioning: false 
        };
        
        let player = { 
            x: 200, y: 530, w: 160, h: 160, vx: 0, vy: 0, speed: 10, jump: -26, 
            grounded: false, facing: 1, anim: 'idle', frame: 0, sprites: {}, invul: 0 
        };
        
        let enemies = [], items = { bags: [], bones: [] }, 
            boss = { active: false, hp: 20, maxHp: 20, x: 6000, defeated: false, img: null };
        let images = {};

        function vibrate(d) { if (navigator.vibrate) navigator.vibrate(d); }

        function loadImg(id) {
            const url = getSpriteUrl(id);
            if (images[url]) return images[url];
            const i = new Image();
            i.crossOrigin = "anonymous"; // Importante para que no se bloquee el dibujo
            i.src = url;
            images[url] = i;
            return i;
        }

        function selectChar(type) {
            const data = ASSETS_MAP[type];
            player.sprites = {
                idle: loadImg(data.idle), walk: loadImg(data.walk), 
                run: loadImg(data.run), jump: loadImg(data.jump), 
                bite: loadImg(data.bite), pee: loadImg(data.pee)
            };
            player.speed = (type === 'zorro') ? 14 : 10;
            player.jump = (type === 'zorro') ? -26 : -38;
            boss.img = loadImg(ASSETS_MAP.enemies.boss);
            initLevel(1);
            document.getElementById('start-screen').style.display = 'none';
            state.playing = true;
        }

        function initLevel(lvl) {
            state.level = lvl; state.cameraX = 0; state.transitioning = false;
            player.x = 200; player.y = 530;
            boss.maxHp = 20 + (lvl * 5); boss.hp = boss.maxHp;
            boss.defeated = false; boss.active = false; boss.x = 6000;
            
            enemies = [];
            const types = ['rat', 'frenchie', 'pigeon', 'golden', 'gavilan', 'collie'];
            for(let i=0; i<8 + lvl*2; i++) {
                const t = types[Math.floor(Math.random() * Math.min(lvl, types.length))];
                enemies.push({ 
                    x: 1200 + (i * 850), type: t, img: loadImg(ASSETS_MAP.enemies[t]), 
                    speed: (3 + Math.random()*3), dir: -1, f: Math.random()*25, 
                    y: t === 'gavilan' ? 180 : 530 
                });
            }
            items.bags = Array.from({length: 10}, (_,i) => ({x: 1000 + i*900, done: false}));
            items.bones = Array.from({length: 6}, (_,i) => ({x: 1500 + i*1400, done: false}));
        }

        // Lógica de entradas
        const keys = {};
        const bind = (id, k) => {
            const el = document.getElementById(id);
            const s = (e) => { e.preventDefault(); keys[k] = true; };
            const e = (e) => { e.preventDefault(); keys[k] = false; };
            el.addEventListener('mousedown', s); el.addEventListener('touchstart', s);
            el.addEventListener('mouseup', e); el.addEventListener('touchend', e);
        };
        bind('ctrlLeft', 'ArrowLeft'); bind('ctrlRight', 'ArrowRight'); bind('ctrlDown', 'ArrowDown'); bind('ctrlJump', 'Space'); bind('ctrlBite', 'KeyZ');
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function update() {
            if (!state.playing || state.transitioning) return;

            // Lógica del Héroe
            player.anim = 'idle';
            if (keys['ArrowRight']) { player.vx = player.speed; player.facing = 1; player.anim = 'run'; }
            else if (keys['ArrowLeft']) { player.vx = -player.speed; player.facing = -1; player.anim = 'run'; }
            else { player.vx *= 0.82; }

            if (keys['Space'] && player.grounded) { player.vy = player.jump; player.grounded = false; vibrate(20); }
            if (!player.grounded) player.anim = 'jump';
            if (keys['KeyZ']) player.anim = 'bite';
            if (keys['ArrowDown'] && player.grounded) player.anim = 'pee';

            // Físicas básicas
            player.vy += 1.8; player.x += player.vx; player.y += player.vy;
            if (player.y > 530) { player.y = 530; player.vy = 0; player.grounded = true; }
            if (player.x < 0) player.x = 0;

            // Cámara y Parallax
            state.cameraX = Math.max(0, Math.min(state.worldW - GAME_W, player.x - 400));
            state.parallaxX = state.cameraX * 0.4;
            player.frame = (player.frame + 0.5) % 25;

            // Colisiones con enemigos
            enemies.forEach(en => {
                en.x += en.speed * en.dir; if (en.x > state.worldW || en.x < 100) en.dir *= -1;
                en.f = (en.f + 0.45) % 25;
                if (player.invul <= 0 && Math.abs(player.x - en.x) < 80 && Math.abs(player.y - en.y) < 80 && !keys['KeyZ']) {
                    state.health--; player.invul = 60; vibrate([100, 50, 100]); player.vx = player.facing * -25;
                    if (state.health <= 0) { state.playing = false; document.getElementById('game-over-screen').style.display = 'flex'; }
                }
            });

            // Lógica del Jefe
            if (player.x > 5000 && !boss.defeated) {
                boss.active = true; document.getElementById('boss-ui').style.display = 'block';
                boss.x += (player.x < boss.x ? -2.5 : 2.5);
                if (keys['KeyZ'] && Math.abs(player.x - boss.x) < 220) {
                    boss.hp -= 0.2; document.getElementById('hp-fill').style.width = (boss.hp/boss.maxHp*100) + '%';
                    if (boss.hp <= 0) { boss.defeated = true; boss.active = false; document.getElementById('boss-ui').style.display = 'none'; vibrate(400); }
                }
            }

            if (player.invul > 0) player.invul--;
            document.getElementById('ui-score').innerText = state.score.toString().padStart(3, '0');
            document.getElementById('ui-health').innerText = "❤".repeat(Math.max(0, state.health));
        }

        function drawSprite(img, x, y, size, frame, facing, fallbackColor = '#3498db') {
            const col = Math.floor(frame % 5), row = Math.floor(frame / 5);
            ctx.save();
            ctx.translate(x + (facing === -1 ? size : 0) - state.cameraX, y);
            ctx.scale(facing, 1);
            
            // Dibujamos el sprite si cargó, sino una silueta de respaldo
            if (img && img.complete && img.naturalWidth !== 0) {
                ctx.drawImage(img, col * 256, row * 256, 256, 256, 0, 0, size, size);
            } else {
                ctx.fillStyle = fallbackColor;
                ctx.beginPath();
                ctx.roundRect(0, size/4, size, size*0.75, 20);
                ctx.fill();
                // Detalle para identificar al personaje
                ctx.fillStyle = 'black'; ctx.fillRect(size*0.7, size/2, 10, 10);
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, GAME_W, GAME_H);
            if (!state.playing && state.health > 0) return;

            // Fondo Parallax
            ctx.fillStyle = '#161a1d';
            for(let i=0; i<30; i++) ctx.fillRect((i*750) - state.parallaxX, 50, 600, 650);

            // Suelo
            ctx.fillStyle = '#34495e'; ctx.fillRect(0 - state.cameraX, 650, 20000, 70);
            
            // Objetos
            items.bags.forEach(b => {
                ctx.fillStyle = b.done ? '#f1c40f' : '#111';
                ctx.beginPath(); ctx.ellipse(b.x - state.cameraX, 640, 40, 50, 0, 0, 7); ctx.fill();
            });

            // Personajes
            enemies.forEach(en => drawSprite(en.img, en.x, en.y, 140, en.f, en.dir, '#e74c3c'));
            if (boss.active) drawSprite(boss.img, boss.x, 420, 300, player.frame, -1, '#f1c40f');
            if (player.invul % 4 < 2) {
                const currentImg = player.sprites[player.anim] || player.sprites.idle;
                drawSprite(currentImg, player.x, player.y, player.w, player.frame, player.facing, '#3498db');
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        
        window.onload = () => {
            const hScore = localStorage.getItem('uDogHighScore') || 0;
            const mLevel = localStorage.getItem('uDogMaxLevel') || 1;
            document.getElementById('high-score').innerText = hScore;
            document.getElementById('max-level').innerText = mLevel;
            loop();
        };
    </script>
</body>
</html>
